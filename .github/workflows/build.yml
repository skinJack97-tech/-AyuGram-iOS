name: Build My AyuGram
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix Dependencies and Versions
        run: |
          # 1. Исправляем ошибку v26 (iOS 18)
          find . -name "Package.swift" -exec sed -i '' 's/\.v26/\.v15/g' {} +
          
          # 2. Исправляем ошибку с веткой master -> main (для TDLibKit и других)
          find . -name "Package.swift" -exec sed -i '' 's/branch: "master"/branch: "main"/g' {} +
          
          echo "All fixes applied!"

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build
        run: |
          cd iOS
          xcodebuild archive \
            -scheme AyuGram \
            -destination "generic/platform=iOS" \
            -archivePath build/AyuGram.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Export
        run: |
          mkdir -p Payload
          find . -name "*.app" -type d -exec cp -R {} Payload/ \;
          zip -r AyuGram.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Final-IPA
          path: AyuGram.ipa
