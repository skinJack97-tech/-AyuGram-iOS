name: Build My AyuGram
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Build IPA
        run: |
          # Ищем файл Make.py автоматически
          MAKE_PATH=$(find . -name "Make.py" | head -n 1)
          echo "Found Make at: $MAKE_PATH"
          
          python3 "$MAKE_PATH" \
          --cacheDir="$HOME/telegram-bazel-cache" \
          build \
          --configuration=release \
          --buildNumber=100 \
          --installGuide=false
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Final-IPA
          path: "**/artifacts/*.ipa"
