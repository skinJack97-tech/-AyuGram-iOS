name: Debug Repository Structure
on: workflow_dispatch

jobs:
  debug:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Show all files
        run: |
          echo "--- Root directory ---"
          ls -F
          echo "--- iOS directory ---"
          ls -F iOS/ || echo "Folder iOS not found"
          echo "--- Searching for any python scripts ---"
          find . -name "*.py"
