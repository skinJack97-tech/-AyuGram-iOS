name: Build My AyuGram
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix Project Files
        run: |
          # Возвращаем v26 (iOS 18), так как сервер все равно ее ищет
          find . -name "Package.swift" -exec sed -i '' 's/\.v15/\.v26/g' {} +
          find . -name "Package.swift" -exec sed -i '' 's/\.v24/\.v26/g' {} +
          find . -name "Package.swift" -exec sed -i '' 's/branch: "master"/branch: "main"/g' {} +

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install iOS 18 SDK
        run: |
          # Это решит ошибку "iOS 18.0 is not installed"
          xcodebuild -downloadPlatform iOS

      - name: Build
        run: |
          cd iOS
          xcodebuild archive \
            -scheme AyuGram \
            -destination "generic/platform=iOS" \
            -archivePath build/AyuGram.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -quiet

      - name: Export
        run: |
          mkdir -p Payload
          find iOS/build/AyuGram.xcarchive/Products/Applications -name "*.app" -type d -exec cp -R {} Payload/ \;
          zip -r AyuGram.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Final-IPA
          path: AyuGram.ipa
