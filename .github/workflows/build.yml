name: Build My AyuGram
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Auto-locate and Build
        run: |
          # Ищем файл Make.py по всему репозиторию
          SCRIPT_PATH=$(find . -name "Make.py" | head -n 1)
          
          if [ -z "$SCRIPT_PATH" ]; then
            echo "Ошибка: Файл Make.py не найден вообще!"
            exit 1
          fi
          
          echo "Файл найден по пути: $SCRIPT_PATH"
          SCRIPT_DIR=$(dirname "$SCRIPT_PATH")
          
          # Переходим в папку, где лежит скрипт, и запускаем его
          cd "$SCRIPT_DIR"
          python3 Make.py \
          --cacheDir="$HOME/telegram-bazel-cache" \
          build \
          --configuration=release \
          --buildNumber=100 \
          --installGuide=false
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Final-IPA
          path: "**/artifacts/*.ipa"
