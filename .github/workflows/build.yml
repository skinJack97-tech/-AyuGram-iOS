name: Build My AyuGram
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Build IPA
        run: |
          # Ищем, где спрятан Make.py
          MAKE_FILE=$(find . -name "Make.py" | head -n 1)
          MAKE_DIR=$(dirname "$MAKE_FILE")
          # Поднимаемся на две папки выше от Make.py, так как он обычно в build-system/Make/
          ROOT_DIR=$(cd "$MAKE_DIR/../.." && pwd)
          
          echo "Found Make.py at: $MAKE_FILE"
          echo "Root directory for build: $ROOT_DIR"
          
          cd "$ROOT_DIR"
          python3 build-system/Make/Make.py \
          --cacheDir="$HOME/telegram-bazel-cache" \
          build \
          --configuration=release \
          --buildNumber=100 \
          --installGuide=false
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Final-IPA
          path: "**/artifacts/*.ipa"
