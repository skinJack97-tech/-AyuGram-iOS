name: Build My AyuGram
on: workflow_dispatch

jobs:
  build:
    # Возвращаемся на стабильную версию, где меньше проблем с безопасностью
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Force Patch Project
        run: |
          # Вырезаем iOS 18 (v26) и ставим iOS 15 везде
          find . -name "Package.swift" -exec sed -i '' 's/\.v26/\.v15/g' {} +
          # Массово меняем ветку master на main во всех файлах проекта
          find . -type f -name "*" -exec sed -i '' 's/branch: "master"/branch: "main"/g' {} +
          echo "Project patched"

      - name: Build
        run: |
          cd iOS
          # Собираем максимально простым методом без лишних проверок
          xcodebuild archive \
            -scheme AyuGram \
            -destination "generic/platform=iOS" \
            -archivePath build/AyuGram.xcarchive \
            -skipPackageDependencyValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Export
        run: |
          mkdir -p Payload
          # Ищем приложение в архиве и копируем
          find iOS/build/AyuGram.xcarchive/Products/Applications -name "*.app" -type d -exec cp -R {} Payload/ \;
          zip -r AyuGram.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Final-IPA
          path: AyuGram.ipa
