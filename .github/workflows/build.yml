name: Build My AyuGram
on: workflow_dispatch

jobs:
  build:
    # Переключаемся на самую новую версию сервера
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Build with Xcode
        run: |
          cd iOS
          # Собираем проект, игнорируя ошибки подписи (т.к. у нас нет платного аккаунта разработчика)
          xcodebuild archive \
            -scheme AyuGram \
            -destination "generic/platform=iOS" \
            -archivePath build/AyuGram.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
            
      - name: Export IPA
        run: |
          mkdir -p build/Payload
          # Копируем само приложение в папку Payload для создания IPA
          cp -R iOS/build/AyuGram.xcarchive/Products/Applications/*.app build/Payload/
          cd build
          zip -r AyuGram.ipa Payload
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Final-IPA
          path: build/AyuGram.ipa
