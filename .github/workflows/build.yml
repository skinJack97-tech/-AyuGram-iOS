name: Build My AyuGram
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: List Files
        run: ls -R
          
      - name: Build IPA
        run: |
          # Ищем любой файл python для сборки
          BUILD_SCRIPT=$(find . -name "build.py" -o -name "Make.py" | head -n 1)
          echo "Using script: $BUILD_SCRIPT"
          
          python3 "$BUILD_SCRIPT" \
          build \
          --configuration=release \
          --buildNumber=100
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Final-IPA
          path: "**/*.ipa"
