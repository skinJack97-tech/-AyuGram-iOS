name: Build My AyuGram
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Build IPA
        run: |
          # Находим точный путь к Make.py
          MAKE_PATH=$(find $GITHUB_WORKSPACE -name "Make.py" | head -n 1)
          MAKE_DIR=$(dirname "$MAKE_PATH")
          
          echo "Full path to script: $MAKE_PATH"
          
          # Переходим в папку со скриптом и запускаем его
          cd "$MAKE_DIR"
          python3 Make.py \
          --cacheDir="$HOME/telegram-bazel-cache" \
          build \
          --configuration=release \
          --buildNumber=100 \
          --installGuide=false
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Final-IPA
          path: "**/*.ipa"
