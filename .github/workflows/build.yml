name: Build My AyuGram
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Force Patch
        run: |
          # Исправляем iOS 18 и ветки, как и раньше
          find . -name "Package.swift" -exec sed -i '' 's/\.v26/\.v15/g' {} +
          find . -name "Package.swift" -exec sed -i '' 's/branch: "master"/branch: "main"/g' {} +

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build
        run: |
          cd iOS
          # Используем максимально агрессивный пропуск всех проверок пакетов
          xcodebuild archive \
            -scheme AyuGram \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/AyuGram.xcarchive \
            -skipPackageDependencyValidation \
            -skipPackageFingerprintValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Export
        run: |
          mkdir -p Payload
          # Копируем приложение из архива
          find iOS/build/AyuGram.xcarchive/Products/Applications -name "*.app" -type d -exec cp -R {} Payload/ \;
          zip -r AyuGram.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Final-IPA
          path: AyuGram.ipa
