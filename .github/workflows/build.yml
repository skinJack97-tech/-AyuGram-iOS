name: Build My AyuGram
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix Project Files
        run: |
          find . -name "Package.swift" -exec sed -i '' 's/\.v15/\.v26/g' {} +
          find . -name "Package.swift" -exec sed -i '' 's/\.v24/\.v26/g' {} +
          find . -name "Package.swift" -exec sed -i '' 's/branch: "master"/branch: "main"/g' {} +

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install SDK & Resolve Deps
        run: |
          xcodebuild -downloadPlatform iOS || true
          cd iOS
          # Ключевой шаг: принудительно качаем все библиотеки
          xcodebuild -resolvePackageDependencies

      - name: Build & Archive
        run: |
          cd iOS
          # Убираем флаг clean, чтобы не удалять скачанные зависимости
          xcodebuild archive \
            -scheme AyuGram \
            -destination "generic/platform=iOS" \
            -archivePath build/AyuGram.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          mkdir -p Payload
          # Ищем приложение более гибким способом
          APP_PATH=$(find iOS/build/AyuGram.xcarchive -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then echo "❌ Приложение не найдено!"; exit 1; fi
          cp -R "$APP_PATH" Payload/
          zip -r AyuGram.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Final-IPA
          path: AyuGram.ipa
