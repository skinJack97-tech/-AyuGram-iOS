name: Build My AyuGram

on:
  workflow_dispatch

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix Project Files
        run: |
          # Возвращаем v26 (iOS 18), так как сервер все равно ее ищет
          find . -name "Package.swift" -exec sed -i '' 's/\.v15/\.v26/g' {} +
          find . -name "Package.swift" -exec sed -i '' 's/\.v24/\.v26/g' {} +
          find . -name "Package.swift" -exec sed -i '' 's/branch: "master"/branch: "main"/g' {} +

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app
          xcodebuild -version

      - name: Install iOS 18 SDK (if needed)
        run: |
          xcodebuild -downloadPlatform iOS || true

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Build
        run: |
          cd iOS
          xcodebuild archive \
            -scheme AyuGram \
            -destination "generic/platform=iOS" \
            -archivePath build/AyuGram.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGN_STYLE=Manual \
            -quiet || echo "Build failed with exit code $?"

      - name: Export IPA
        run: |
          mkdir -p Payload
          find iOS/build/AyuGram.xcarchive/Products/Applications -name "*.app" -type d -exec cp -R {} Payload/ \;
          zip -r AyuGram.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Final-IPA
          path: AyuGram.ipa
