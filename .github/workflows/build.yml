name: Build My AyuGram
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Resolve Deps
        run: |
          cd iOS
          xcodebuild -resolvePackageDependencies

      - name: Build & Archive
        run: |
          cd iOS
          # Добавляем флаги игнорирования ошибок компиляции и проверок
          xcodebuild archive \
            -scheme AyuGram \
            -destination "generic/platform=iOS" \
            -archivePath build/AyuGram.xcarchive \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            OTHER_SWIFT_FLAGS="-suppress-warnings" \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find iOS/build/AyuGram.xcarchive -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then echo "❌ Приложение не найдено!"; exit 1; fi
          cp -R "$APP_PATH" Payload/
          zip -r AyuGram.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Final-IPA
          path: AyuGram.ipa
