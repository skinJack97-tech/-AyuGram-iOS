name: Build My AyuGram

on:
  workflow_dispatch

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix Project Files
        run: |
          # Возвращаем v26 (iOS 18)
          find . -name "Package.swift" -exec sed -i '' 's/\.v15/\.v26/g' {} +
          find . -name "Package.swift" -exec sed -i '' 's/\.v24/\.v26/g' {} +
          find . -name "Package.swift" -exec sed -i '' 's/branch: "master"/branch: "main"/g' {} +

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app
          xcodebuild -version

      - name: Install iOS 18 SDK
        run: |
          xcodebuild -downloadPlatform iOS || true

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Build & Archive
        run: |
          cd iOS
          xcodebuild clean archive \
            -scheme AyuGram \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/AyuGram.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGN_STYLE=Manual \
            | tee build.log

      - name: Debug - Show archive structure
        run: |
          echo "=== Contents of build directory ==="
          ls -la iOS/build/ || true
          echo "=== xcarchive structure (if exists) ==="
          ls -la iOS/build/AyuGram.xcarchive/ || true
          echo "=== Products/Applications (if exists) ==="
          ls -la iOS/build/AyuGram.xcarchive/Products/Applications/ || true
          echo "=== Full build log last 50 lines ==="
          tail -n 50 iOS/build.log || true

      - name: Export IPA
        run: |
          cd iOS
          
          if [ ! -d "build/AyuGram.xcarchive/Products/Applications" ]; then
            echo "❌ Ошибка: xcarchive пустой или не создан!"
            echo "Проверь лог выше. Чаще всего проблема в схеме AyuGram (Skip Install = YES или неправильная конфигурация для Archive)."
            exit 1
          fi
          
          mkdir -p Payload
          find build/AyuGram.xcarchive/Products/Applications -name "*.app" -type d -exec cp -R {} Payload/ \;
          
          if [ ! -d "Payload/AyuGram.app" ]; then
            echo "❌ Не найдено AyuGram.app внутри архива"
            exit 1
          fi
          
          zip -r AyuGram.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Final-IPA
          path: iOS/AyuGram.ipa

      - name: Upload Build Log (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Log
          path: iOS/build.log
