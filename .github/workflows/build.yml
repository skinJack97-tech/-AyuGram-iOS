name: Build My AyuGram
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix Everything
        run: |
          # 1. Снижаем версию iOS до максимально понятной всем Xcode
          find . -name "Package.swift" -exec sed -i '' 's/\.v26/\.v15/g' {} +
          # 2. Исправляем ссылки на ветки
          find . -name "Package.swift" -exec sed -i '' 's/branch: "master"/branch: "main"/g' {} +
          # 3. Отключаем строгую проверку типов Swift, из-за которой падает билд 65
          find . -name "*.swiftinterface" -exec rm -f {} +
          echo "All fixes applied!"

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build and Archive
        run: |
          cd iOS
          xcodebuild archive \
            -scheme AyuGram \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/AyuGram.xcarchive \
            -allowProvisioningUpdates \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_COMPILATION_MODE=wholemodule \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Export IPA
        run: |
          mkdir -p Payload
          # Ищем собранное приложение и копируем его в папку для упаковки
          find iOS/build/AyuGram.xcarchive/Products/Applications -name "*.app" -type d -exec cp -R {} Payload/ \;
          zip -r AyuGram.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Final-IPA
          path: AyuGram.ipa
